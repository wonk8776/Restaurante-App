<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTIQ — Acceso</title>
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0F2D5E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RESTIQ">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0C1A2E 0%, #0F2847 50%, #0C1A2E 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .login-container {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            position: relative;
        }
        .login-container .restiq-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
            color: #0F172A;
        }
        .login-container .restiq-logo svg {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        .login-container .restiq-logo span:last-of-type {
            font-size: 22px;
            font-weight: 800;
            color: #0F172A;
            letter-spacing: -0.02em;
        }
        .login-container .restiq-logo::after { display: none; }
        .subtitle {
            font-size: 13px;
            color: #64748B;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 400;
        }
        .login-container .form-group { margin-bottom: 16px; text-align: left; }
        .login-container .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #0F172A;
            margin-bottom: 6px;
        }
        .login-container input {
            width: 100%;
            max-width: 100%;
            height: 38px;
            padding: 0 12px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            color: #0F172A;
        }
        .login-container input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .login-container input::placeholder { color: #94A3B8; }
        button[type="submit"], #loginBtn {
            width: 100%;
            height: 42px;
            background: #2563EB;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            border: none;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 150ms ease;
        }
        button[type="submit"]:hover, #loginBtn:hover { background: #1D4ED8; }
        #btnInstall {
            width: 100%;
            height: 38px;
            background: transparent;
            color: #64748B;
            border: 1px solid #E2E8F0;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            transition: all 150ms ease;
        }
        #btnInstall:hover { background: #F8FAFC; color: #0F172A; }
        .error-message {
            color: #DC2626;
            font-size: 13px;
            margin-top: 1rem;
            min-height: 1.25rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-message.visible { opacity: 1; }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #FFFFFF;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button.loading .button-text { display: none; }
        button.loading .spinner { display: block; }
    </style>
</head>

<body>

    <div class="login-container">
        <span class="restiq-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="28" height="28" rx="7" fill="#2563EB"/>
                <path d="M7 8h8.5a3.5 3.5 0 0 1 0 7H7V8z" fill="white"/>
                <path d="M7 15h5l5 5H7v-5z" fill="white" opacity="0.7"/>
                <rect x="18" y="15" width="3" height="5" rx="1.5" fill="white" opacity="0.9"/>
            </svg>
            <span>RESTIQ</span>
        </span>
        <p class="subtitle">Software de gestión para restaurantes</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">CORREO ELECTRÓNICO</label>
                <input type="email" id="email" required autocomplete="email" placeholder="nombre@restaurante.com">
            </div>

            <div class="form-group">
                <label for="password">CONTRASEÑA</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <button type="submit" id="loginBtn">
                <span class="button-text">INGRESAR</span>
                <div class="spinner"></div>
            </button>

            <div style="text-align:center; margin-top: 0.75rem;">
                <span style="font-size:0.75rem; color: var(--color-text-muted);">— o —</span>
            </div>
            <button type="button" id="btnDemo" style="
                width: 100%;
                margin-top: 0.75rem;
                padding: 12px;
                background: transparent;
                border: 1.5px solid var(--color-primary);
                color: var(--color-primary);
                border-radius: 8px;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
                font-family: var(--font-body);
            ">
                Ver demo →
            </button>

            <button
                type="button"
                id="btnInstall"
                style="display:none; margin-top: 8px;"
            >Instalar app</button>

            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <!-- App Configuration -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(function (err) { console.warn('SW no registrado:', err); });
        }

        (function () {
            var deferredPrompt = null;
            var btnInstall = document.getElementById('btnInstall');
            if (!btnInstall) return;

            window.addEventListener('beforeinstallprompt', function (e) {
                e.preventDefault();
                deferredPrompt = e;
                btnInstall.style.display = 'block';
            });

            btnInstall.addEventListener('click', function () {
                if (!deferredPrompt) return;
                btnInstall.disabled = true;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function () {
                    deferredPrompt = null;
                    btnInstall.style.display = 'none';
                    btnInstall.disabled = false;
                }).catch(function () {
                    btnInstall.disabled = false;
                });
            });

            window.addEventListener('appinstalled', function () {
                deferredPrompt = null;
                btnInstall.style.display = 'none';
            });
        })();

        var btnDemo = document.getElementById('btnDemo');
        if (btnDemo) {
            btnDemo.addEventListener('mouseenter', function() {
                this.style.background = 'var(--color-primary)';
                this.style.color = '#0f172a';
            });
            btnDemo.addEventListener('mouseleave', function() {
                this.style.background = 'transparent';
                this.style.color = 'var(--color-primary)';
            });
            btnDemo.addEventListener('click', function() {
                var emailInput = document.getElementById('email') ||
                                 document.querySelector('input[type="email"]');
                var passInput = document.getElementById('password') ||
                                document.querySelector('input[type="password"]');
                var submitBtn = document.getElementById('loginBtn') ||
                                document.querySelector('button[type="submit"]');
                if (emailInput) emailInput.value = 'demo@restiq.com';
                if (passInput) passInput.value = 'demo1234';
                if (submitBtn) submitBtn.click();
            });
        }
    </script>
</body>

</html>
